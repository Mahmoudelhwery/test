<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Ahmed Zedan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--dark); min-height: 100vh; display: flex; justify-content: center; align-items: center; color: white; padding: 30px 0; }

        #splash { position: fixed; inset: 0; background: var(--dark); display: flex; justify-content: center; align-items: center; z-index: 1000; animation: fadeOut 0.4s ease 1.1s forwards; }
        .splash-text { font-size: 3.2rem; color: var(--gold); font-weight: 900; letter-spacing: 5px; text-align: center; }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        #main { opacity: 0; animation: fadeIn 0.5s ease 1.3s forwards; width: 100%; display: flex; justify-content: center; }
        @keyframes fadeIn { to { opacity: 1; } }

        .container { width: 95%; max-width: 450px; background: #111; border-radius: 30px; border: 1px solid rgba(212,175,55,0.2); overflow: hidden; padding-bottom: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        
        .header { width: 100%; height: 220px; border-bottom: 2px solid var(--gold); position: relative; background: url('https://raw.githubusercontent.com/M-Maher9/personal-assets/main/cover.jpg') center/100% 100% no-repeat; }
        
        .profile-circle { 
            position: absolute; bottom: -65px; left: 50%; transform: translateX(-50%); 
            width: 130px; height: 130px; border-radius: 50%; border: 3px solid var(--gold); 
            background: #111 url('https://raw.githubusercontent.com/M-Maher9/personal-assets/main/portrait.jpg') center/cover; z-index: 10;
        }

        .info { margin-top: 75px; text-align: center; padding: 0 20px; }
        h1 { color: var(--gold); font-size: 1.8rem; margin-bottom: 5px; font-weight: 700; }
        .bio { color: #888; font-size: 1rem; margin-bottom: 25px; }

        .links { display: flex; flex-direction: column; gap: 12px; padding: 0 20px; }
        .btn { display: flex; align-items: center; padding: 14px; border-radius: 12px; text-decoration: none; color: white; background: rgba(255,255,255,0.05); border: 1px solid rgba(212,175,55,0.1); transition: 0.3s; }
        .btn:hover { background: rgba(212,175,55,0.15); border-color: var(--gold); transform: scale(1.02); }
        .btn i { font-size: 1.2rem; color: var(--gold); margin-left: 12px; width: 25px; text-align: center; }
        .btn span { flex-grow: 1; text-align: right; font-weight: 600; }
        
        .btn-gold { background: var(--gold); color: black; font-weight: 700; }
        .btn-gold i { color: black; }

        .footer { text-align: center; margin-top: 30px; color: #444; font-size: 0.7rem; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="splash"><div class="splash-text">DR. AHMED ZEDAN</div></div>

    <div id="main">
        <div class="container">
            <div class="header"><div class="profile-circle"></div></div>

            <div class="info">
                <h1>د. أحمد زيدان</h1>
                <p class="bio">أخصائي طب وجراحة الفم والأسنان</p>
            </div>

            <div class="links">
                <a href="tel:01115471086" class="btn btn-gold">
                    <i class="fas fa-phone-alt"></i>
                    <span>اتصل بنا الآن للحجز</span>
                </a>

                <a href="https://ipn.eg/S/cib/zedandental/instapay/2rE3Wn" target="_blank" class="btn">
                    <i class="fas fa-money-bill-wave"></i>
                    <span>الدفع عبر إنستاباي - Instapay</span>
                </a>

                <a href="https://www.facebook.com/share/v/1B8bEy49QA/" target="_blank" class="btn">
                    <i class="fab fa-facebook-f"></i>
                    <span>فيسبوك - Facebook</span>
                </a>

                <a href="https://www.instagram.com/dr.ahmedzedandhmd/" target="_blank" class="btn">
                    <i class="fab fa-instagram"></i>
                    <span>إنستجرام - Instagram</span>
                </a>

                <a href="https://www.tiktok.com/@zedan_dental_clinic" target="_blank" class="btn">
                    <i class="fab fa-tiktok"></i>
                    <span>تيك توك - TikTok</span>
                </a>
                
                <a href="https://maps.app.goo.gl/ChIJpY9a-FzF9xQRiY8fwWKrP64" target="_blank" class="btn">
                    <i class="fas fa-map-marker-alt"></i>
                    <span>موقع العيادة على الخريطة</span>
                </a>
            </div>
            
            <div class="footer">LUXURY DENTAL CLINIC | 2026</div>
        </div>
    </div>

</body>
</html>
